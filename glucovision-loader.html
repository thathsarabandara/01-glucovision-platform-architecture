<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>GlucoVision Loader</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#fff;
      min-height:100vh;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      font-family:'Inter',sans-serif;
    }
    .wrap{display:flex;flex-direction:column;align-items:center;gap:14px}

    .logo{width:108px;height:108px;overflow:visible;
      filter:drop-shadow(0 4px 18px rgba(37,99,235,.20))}

    /* ═══════════════════════════════════════════
       6-second loop
       0  –30%  rings draw in
       32 –48%  eye fades+scales in
       44 –58%  cross scales in
       58 –80%  hold
       80 –93%  fade out
       93–100%  blank
    ═══════════════════════════════════════════ */

    /* Blue ring  circumference ≈ 195  (rx=42,ry=16) */
    .ring-b{
      stroke-dasharray:195;stroke-dashoffset:195;
      animation:drawB 6s cubic-bezier(.4,0,.2,1) infinite;
    }
    @keyframes drawB{
      0%  {stroke-dashoffset:195;opacity:0}
      3%  {opacity:1}
      30% {stroke-dashoffset:0;opacity:1}
      80% {stroke-dashoffset:0;opacity:1}
      93% {opacity:0}
      100%{stroke-dashoffset:195;opacity:0}
    }

    /* Green ring  circumference ≈ 172  (rx=38,ry=12) */
    .ring-g{
      stroke-dasharray:172;stroke-dashoffset:172;
      animation:drawG 6s cubic-bezier(.4,0,.2,1) infinite;
    }
    @keyframes drawG{
      0%  {stroke-dashoffset:172;opacity:0}
      6%  {opacity:1}
      32% {stroke-dashoffset:0;opacity:1}
      80% {stroke-dashoffset:0;opacity:1}
      93% {opacity:0}
      100%{stroke-dashoffset:172;opacity:0}
    }

    /* Eye */
    .eye-g{
      transform-box:fill-box;transform-origin:center;
      animation:eyeIn 6s ease-in-out infinite;
    }
    @keyframes eyeIn{
      0%,32%{opacity:0;transform:scale(.1)}
      48%   {opacity:1;transform:scale(1)}
      80%   {opacity:1;transform:scale(1)}
      93%   {opacity:0;transform:scale(.95)}
      100%  {opacity:0;transform:scale(.1)}
    }

    /* Cross — transform-box fixes scale pivot */
    .cross-g{
      transform-box:fill-box;transform-origin:center;
      animation:crossIn 6s ease-in-out infinite;
    }
    @keyframes crossIn{
      0%,44%{opacity:0;transform:scale(.2)}
      58%   {opacity:1;transform:scale(1)}
      80%   {opacity:1;transform:scale(1)}
      93%   {opacity:0;transform:scale(.95)}
      100%  {opacity:0;transform:scale(.2)}
    }

    /* Text */
    .txt{animation:txtIn 6s ease-in-out infinite}
    @keyframes txtIn{
      0%,54%{opacity:0;transform:translateY(4px)}
      68%   {opacity:1;transform:translateY(0)}
      80%   {opacity:1}
      93%   {opacity:0}
      100%  {opacity:0}
    }
    .brand{font-size:16px;font-weight:600;letter-spacing:.28em;
           color:#334155;text-transform:uppercase;text-align:center}
    .brand em{font-style:normal;color:#2563eb}
    .sub{margin-top:3px;font-size:10px;letter-spacing:.18em;
         color:#94a3b8;text-transform:uppercase;text-align:center}
  </style>
</head>
<body>
<div class="wrap">

<!--
  viewBox 0 0 100 100, center 50 50
  Blue  ring: rx=42 ry=16  rotate(-55°)  ← steep \ matching image
  Green ring: rx=38 ry=12  rotate(+22°)  ← shallow / matching image
  Eye:   iris r=15, pupil r=8.5
  Cross: lower-right of green ring tip ≈ (76,68)
-->
<svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1e40af"/>
      <stop offset="50%"  stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="gG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0f766e"/>
      <stop offset="50%"  stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <radialGradient id="gEye" cx="36%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#93c5fd"/>
      <stop offset="45%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <radialGradient id="gPup" cx="40%" cy="36%" r="60%">
      <stop offset="0%"   stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <filter id="fGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fEye" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3"
                    flood-color="#1e3a8a" flood-opacity=".38"/>
    </filter>
  </defs>

  <!-- BLUE RING  rotate(-55°) — steep diagonal \ like image -->
  <ellipse class="ring-b"
    cx="50" cy="50" rx="42" ry="15"
    transform="rotate(-44 50 50)"
    fill="none" stroke="url(#gB)"
    stroke-width="6" stroke-linecap="round"
    filter="url(#fGlow)"/>

  <!-- GREEN RING  rotate(+22°) — shallow diagonal / like image -->
  <ellipse class="ring-g"
    cx="50" cy="50" rx="43" ry="13"
    transform="rotate(40 50 50)"
    fill="none" stroke="url(#gG)"
    stroke-width="6" stroke-linecap="round"
    filter="url(#fGlow)"/>

  <!-- EYE -->
  <g class="eye-g" filter="url(#fEye)">
    <circle cx="50" cy="50" r="12"   fill="url(#gEye)"/>
    <circle cx="50" cy="50" r="17.5" fill="none"
            stroke="#3b82f6" stroke-width="1" opacity=".4"/>
    <circle cx="50" cy="50" r="5.5"  fill="url(#gPup)"/>
    <circle cx="44.5" cy="44" r="1.5" fill="white" opacity=".88"/>
    <circle cx="54"   cy="54" r="1.4" fill="white" opacity=".38"/>
  </g>

  <!-- MEDICAL CROSS
       Green ring rx=38, rotate(+22°):
       tip at t≈20° → local(35.7,6.5) → rotated: (35.7·cos22-6.5·sin22, 35.7·sin22+6.5·cos22)
                    ≈ (33.1-2.4, 13.4+6.0) = (30.7,19.4) → SVG(80.7,69.4)
       Centre cross at (76,68), arms ±5, bar-width 4 -->
  <g class="cross-g">
    <rect x="78" y="68" width="10" height="4" rx="1.2" fill="#10b900"/>
    <rect x="81" y="64" width="4"  height="10" rx="1.2" fill="#10b981"/>
  </g>

</svg>

<div class="txt">
  <div class="brand">GLUCO<em>VISION</em></div>
  <div class="sub">Connect.Protect.Care</div>
</div>

</div>
</body>
</html>
